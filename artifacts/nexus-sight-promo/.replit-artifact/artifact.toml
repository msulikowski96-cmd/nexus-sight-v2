kind = "video"
previewPath = "/nexus-sight-promo/"
title = "Nexus Sight — Promo Video"
version = "1.0.0"
id = "artifacts/nexus-sight-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nexus-sight-promo/" ]
localPort = 20250

[services.development]
run = "pnpm --filter @workspace/nexus-sight-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexus-sight-promo", "run", "build" ]
publicDir = "artifacts/nexus-sight-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20250"
BASE_PATH = "/nexus-sight-promo/"
